<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HASIL TKA - SMP IT Najib Rasyid</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            color: var(--text-main);
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 480px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            overflow: hidden;
            position: relative;
            border-top: 5px solid var(--primary);
        }

        .header {
            padding: 32px 24px 20px;
            text-align: center;
            background-color: var(--card-bg);
        }

        .school-logo {
            width: 80px;
            height: auto;
            margin-bottom: 16px;
            object-fit: contain;
        }

        .school-badge {
            display: inline-block;
            background-color: #eff6ff;
            color: var(--primary-dark);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            border: 1px solid #bfdbfe;
        }
        
        .header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 8px;
            letter-spacing: -0.025em;
        }
        
        .header p {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .content {
            padding: 0 32px 36px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.2s ease;
            background-color: #f8fafc;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
            background-color: #ffffff;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-password:focus { outline: none; }
        .toggle-password svg { width: 20px; height: 20px; }

        .btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 12px;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .btn:hover {
            background-color: var(--primary-dark);
            transform: translateY(-1px);
        }
        
        .btn:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-danger {
            background-color: transparent;
            color: #ef4444;
            border: 1px solid #fca5a5;
            margin-top: 32px;
            box-shadow: none;
        }

        .btn-danger:hover {
            background-color: #fef2f2;
            border-color: #ef4444;
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 16px;
            min-height: 20px;
            font-weight: 500;
        }

        #dashboard-section { display: none; }

        .welcome-text {
            text-align: center;
            margin-bottom: 32px;
            color: var(--text-muted);
            font-size: 1rem;
        }

        .welcome-text strong {
            display: block;
            color: var(--primary);
            font-size: 1.35rem;
            font-weight: 800;
            margin-top: 6px;
            letter-spacing: -0.025em;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table tr { border-bottom: 1px solid var(--border-color); }
        .data-table tr:last-child { border-bottom: none; }
        .data-table td { padding: 16px 4px; font-size: 0.95rem; }
        .data-table td:first-child { color: var(--text-muted); width: 45%; }
        .data-table td:last-child { font-weight: 600; color: var(--text-main); text-align: right; }

        .score-badge {
            background-color: #eff6ff;
            color: #1d4ed8;
            padding: 6px 14px;
            border-radius: 8px;
            display: inline-block;
            font-weight: 800;
            font-size: 0.95rem;
            border: 1px solid #bfdbfe;
        }

        .loader {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #e2e8f0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .container { border-radius: 12px; border-top: 4px solid var(--primary); }
            .header { padding: 28px 20px 16px; }
            .content { padding: 0 24px 28px; }
            .school-logo { width: 70px; }
            .header h1 { font-size: 1.4rem; }
            .school-badge { font-size: 0.75rem; }
            .data-table td { padding: 14px 2px; font-size: 0.9rem; }
            .welcome-text strong { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="loader" id="loader"><div class="spinner"></div></div>

        <div class="header">
            <img src="https://raw.githubusercontent.com/raizel75/raizel75/3a6812c1e7b78f72bea323eb4a7118867e445b3d/Logo%20SMP%20IT.png" alt="Logo SMP IT Najib Rasyid" class="school-logo">
            <br>
            <div class="school-badge">SMP IT NAJIB RASYID</div>
            <h1>HASIL TKA</h1>
            <p>(TES KEMAMPUAN AKADEMIK)<br>TAHUN 2026</p>
        </div>

        <div class="content">
            <div id="login-section">
                <div class="input-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" placeholder="Masukkan username Anda" autocomplete="off">
                    </div>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="Masukkan password Anda">
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility()" aria-label="Lihat password">
                            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </button>
                    </div>
                </div>
                <button class="btn" id="btnLogin" onclick="prosesLogin()">Masuk Dashboard</button>
                <div id="pesan-error" class="error-msg"></div>
            </div>

            <div id="dashboard-section">
                <div class="welcome-text">
                    Selamat datang,
                    <strong id="lbl-nama">-</strong>
                </div>
                
                <table class="data-table">
                    <tr><td>Nomor Peserta</td><td id="lbl-nomor">-</td></tr>
                    <tr><td>NISN</td><td id="lbl-nisn">-</td></tr>
                    <tr><td>Tempat, Tgl Lahir</td><td id="lbl-ttl">-</td></tr>
                    <tr><td>Matematika</td><td><span class="score-badge" id="lbl-mtk">-</span></td></tr>
                    <tr><td>Bahasa Indonesia</td><td><span class="score-badge" id="lbl-bindo">-</span></td></tr>
                </table>
                
                <button class="btn btn-danger" onclick="prosesLogout()">Keluar Dashboard</button>
            </div>
        </div>
    </div>

    <script>
        // Konfigurasi Database Supabase
        const SUPABASE_URL = 'https://rhgeoubyrsydmbvomkfb.supabase.co/rest/v1/hasilTKA';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJoZ2VvdWJ5cnN5ZG1idm9ta2ZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MzAxNDEsImV4cCI6MjA5NTQwNjE0MX0.E7lFE4JpcF3T67aYXoLpuK0aSYEQfq_HY4VWU_LsPh4';

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById("password");
            const eyeIcon = document.getElementById("eye-icon");
            
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />`;
            } else {
                passwordInput.type = "password";
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />`;
            }
        }

        async function prosesLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const btn = document.getElementById('btnLogin');
            const msg = document.getElementById('pesan-error');
            const loader = document.getElementById('loader');
            
            if(!user || !pass) {
                msg.innerText = "Username dan Password wajib diisi!";
                return;
            }

            loader.style.display = "flex";
            btn.disabled = true;
            msg.innerText = "";

            try {
                // Fetch request langsung ke tabel Supabase dengan filter Ussername dan Password
                const query = `?Ussername=eq.${encodeURIComponent(user)}&Password=eq.${encodeURIComponent(pass)}&select=*`;
                const response = await fetch(SUPABASE_URL + query, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error('Gagal terhubung ke database.');
                }

                const data = await response.json();

                // Mengecek apakah data dengan username dan password tersebut ada di tabel
                if (data.length > 0) {
                    const siswa = data[0]; // Mengambil data siswa pertama yang cocok
                    
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('dashboard-section').style.display = 'block';
                    
                    // Memasukkan data ke dalam tabel menggunakan nama kolom Supabase (Bracket notation untuk kolom dengan spasi)
                    document.getElementById('lbl-nama').innerText = siswa['Nama Peserta'] || '-';
                    document.getElementById('lbl-nomor').innerText = siswa['Nomor Peserta'] || '-';
                    document.getElementById('lbl-nisn').innerText = siswa['NISN'] || '-';
                    document.getElementById('lbl-ttl').innerText = siswa['Tempat, Tanggal Lahir'] || '-';
                    document.getElementById('lbl-mtk').innerText = siswa['Matematika'] || '-';
                    document.getElementById('lbl-bindo').innerText = siswa['Bahasa Indonesia'] || '-';
                } else {
                    msg.innerText = "Username atau Password salah! Periksa kembali.";
                }

            } catch (error) {
                console.error('Error fetching data:', error);
                msg.innerText = "Terjadi kesalahan jaringan atau server. Coba lagi.";
            } finally {
                loader.style.display = "none";
                btn.disabled = false;
            }
        }

        function prosesLogout() {
            const loader = document.getElementById('loader');
            loader.style.display = "flex";
            
            setTimeout(() => {
                loader.style.display = "none";
                document.getElementById('login-section').style.display = 'block';
                document.getElementById('dashboard-section').style.display = 'none';
                
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                document.getElementById('pesan-error').innerText = '';
                
                const passwordInput = document.getElementById("password");
                if(passwordInput.type === "text") {
                    togglePasswordVisibility();
                }
            }, 300);
        }

        document.getElementById('password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                prosesLogin();
            }
        });
    </script>
</body>
</html>
